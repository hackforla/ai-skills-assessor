# YAML file to trigger the fetching of issue comments using the py file below

name: Fetch Issue Comments

on:
  workflow_dispatch: # manual trigger for the GitHub UI
    inputs:
      owner:
        description: "Repository owner (organization or user) "
        required: true
        default: "hackforla"
      repo:
        description: "Repository name"
        required: true
        default: "website"
      users:
        description: "Comma-separated list of GitHub usernames to keep"
        required: true
        default: "JasonUranta,JackRichman,mgodoy2023,Zak234,anonymousanemone"

  issue_comment:
    types: [created]

# Write permissions needed to push into repo
permissions:
  contents: write
  issues: read
  pull-requests: read
  


jobs:
  fetch-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests
        
      - name: Run comment fetcher
        env:
          # "GH_TOKEN" is the personal access token needed to authenticate from GitHub
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
          INPUT_OWNER: ${{ github.event.inputs.owner || 'hackforla' }}
          INPUT_REPO:  ${{ github.event.inputs.repo  || 'website' }}
          INPUT_USERS: ${{ github.event.inputs.users || 'JasonUranta,JackRichman,mgodoy2023,Zak234,anonymousanemone' }}
        run: python scripts/fetch-issue-comments.py

      
      
      # Primary Option: Save JSON Files created as a workflow artifact (to avoid overloading repo with unneded changes)
      - name: "Filler: blah blah blah (for now)"
        uses: actions/upload-artifact@v4
        with:
          name: issue-comments-${{ github.run_id }}
          path: data/issue_comments.json
          if-no-files-found: warn
          retention-days: 90

